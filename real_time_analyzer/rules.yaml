#every tunable number lives here, edit this file and restart the analyzer
#last edited "22/04/2026"


detection:
  ip_threshold: 5 #fail2ban proven/tested not to be false-positive on typos
  ip_window_seconds: 60 #One minute rolling window short and catches bursts
  user_threshold: 20 #Higher than ip users get constant noise
  user_window_seconds: 600 #10 minute window for slower distributed pressure

alerting:
  alert_cooldown_seconds: 300 #5 min cooldown after same alert pops up (kind, ip)

state:
  idle_eviction_seconds: 900 #Forgets ip after 15 minutes of silence, free the RAM

enrichment:
  firehol:
    enabled: true #Free local blocklists
  abuseipdb:
    enabled: false #paid API and disabled if We don't want to actually pay for it





  
